services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: netasset
      POSTGRES_USER: netasset
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netasset"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    # Lokaler Build (docker_start.sh) ODER vorgebautes Image: API_IMAGE in .env.prod setzen.
    build: .
    image: ${API_IMAGE:-netasset-api:latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://netasset:${DB_PASSWORD}@db:5432/netasset
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-anthropic/claude-sonnet-4-5}
      JWT_SECRET: ${JWT_SECRET}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-changeme}
      NVD_API_KEY: ${NVD_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
    # Kein direktes Port-Mapping – nur über Caddy erreichbar

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
      API_UPSTREAM: api:8000   # im Docker-Netz heißt der API-Container "api"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./dashboard/dist:/srv/dashboard:ro   # vom Host gebautes Frontend
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pgdata:
  caddy_data:
  caddy_config:
